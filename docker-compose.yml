services:
  postgres-db:
    image: postgres:16-alpine
    container_name: microapi-postgres
    environment:
      POSTGRES_DB: microapi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: